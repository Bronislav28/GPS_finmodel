sga:
  currency: RUB
  description: >
    SG&A — постоянные административные расходы GPS.
    Расчет: gross salary + annual bonus + social contribution (SFR).
  inflation_driver: inflation_assumptions.rub_inflation
  payroll_assumptions:
    annual_bonus_percent_of_gross:
      value: 0.20
    social_contribution_sfr_percent_of_gross:
      value: 0.30
  target_fte:
    corporate_management:
      ceo_gm: 1
      cfo_finance_controller: 1
      coo_operations: 1
      legal_support: 1
      compliance_regulatory_support: 1
    hr:
      hrbp: 1
      recruiter: 1
      learning_and_development: 1
    finance_and_accounting:
      accounting: 1
      fpna: 1
    admin:
      office_management: 1
      procurement_support: 1
    shared_corporate_services:
      audit: 1
  salary_gross_monthly_rub:
    corporate_management:
      ceo_gm: 1200000
      cfo_finance_controller: 700000
      coo_operations: 700000
      legal_support: 500000
      compliance_regulatory_support: 500000
    hr:
      hrbp: 350000
      recruiter: 300000
      learning_and_development: 250000
    finance_and_accounting:
      accounting: 300000
      fpna: 400000
    admin:
      office_management: 250000
      procurement_support: 250000
    shared_corporate_services:
      audit: 250000
  calculation_logic:
    target_sga_fte: sum(target_fte)
    annual_gross_salary_by_role: monthly_gross_salary_by_role * target_fte_by_role * 12 * inflation_index_t
    annual_bonus_by_role: annual_gross_salary_by_role * annual_bonus_percent_of_gross * worked_months_ratio
    annual_social_contribution_sfr_by_role: (annual_gross_salary_by_role + annual_bonus_by_role) * social_contribution_sfr_percent_of_gross
    annual_fully_loaded_cost_by_role: annual_gross_salary_by_role + annual_bonus_by_role + annual_social_contribution_sfr_by_role
    annual_fixed_sga: sum(annual_fully_loaded_cost_by_role)
  office_rent:
    description: >
      Аренда офиса GPS рассчитывается исходя из численности сотрудников,
      норматива площади на 1 FTE и ставки аренды за 1 м2 в месяц.
    drivers:
      sqm_per_fte:
        value: 4
      rent_rub_per_sqm_per_month_base_2026:
        value: 3500
      inflation_driver: inflation_assumptions.rub_inflation
    calculation_logic:
      total_fte: core_team_fte + total_sga_fte
      required_office_area_sqm: total_fte * sqm_per_fte
      rent_rub_per_sqm_per_month_t: rent_rub_per_sqm_per_month_base_2026 * inflation_index_t
      monthly_office_rent: required_office_area_sqm * rent_rub_per_sqm_per_month_t
      annual_office_rent: monthly_office_rent * 12
  total_sga:
    formula: annual_fixed_sga + annual_office_rent

revenue:
  currency: RUB
  description: >
    Выручка GPS рассчитывается не через заранее заданную цену токена,
    а через целевую contribution margin к OPEX и D&A. Сценарии отражают
    фактическую кривую потребления рассчитанной мощности GPS.
  consumption_scenarios:
    conservative:
      utilization_of_token_capacity:
        2026: 0.20
        2027: 0.35
        2028: 0.50
        2029: 0.65
        2030: 0.75
    base:
      utilization_of_token_capacity:
        2026: 0.30
        2027: 0.50
        2028: 0.70
        2029: 0.85
        2030: 0.95
    aggressive:
      utilization_of_token_capacity:
        2026: 0.40
        2027: 0.65
        2028: 0.85
        2029: 0.95
        2030: 1.00
  target_contribution_margin:
    conservative:
      2026: 0.10
      2027: 0.15
      2028: 0.20
      2029: 0.25
      2030: 0.30
    base:
      2026: 0.15
      2027: 0.20
      2028: 0.25
      2029: 0.30
      2030: 0.35
    aggressive:
      2026: 0.20
      2027: 0.25
      2028: 0.30
      2029: 0.35
      2030: 0.40
  product_opex_allocation:
    method: token_share
    description: >
      OPEX распределяется между продуктами пропорционально фактическому
      потреблению токенов по каждому продукту.
  calculation_logic:
    sold_tokens: available_token_capacity * utilization_of_token_capacity
    sold_tokens_by_product: available_tokens_by_product * utilization_of_token_capacity
    revenue_active_months: >
      if year < go_live_year then 0
      else if year == go_live_year then 12 - go_live_month + 1
      else 12
    revenue_availability_factor: revenue_active_months / 12
    pricing_base: total_cogs + total_depreciation_and_amortization
    pricing_base_by_product: pricing_base * product_token_share
    annual_revenue_before_go_live_adjustment: pricing_base_by_product / (1 - target_contribution_margin)
    revenue_by_product: annual_revenue_before_go_live_adjustment * revenue_availability_factor
    total_revenue: sum(revenue_by_product)
    implied_price_per_1m_tokens: revenue_by_product / sold_tokens_by_product * 1000000
  pricing_base_description: >
    База для расчета выручки и implied token price включает COGS и depreciation & amortization.
    SG&A не включается в pricing base и учитывается ниже в P&L.

pnl:
  currency: RUB
  description: >
    Profit & Loss model GPS. P&L строится на основе Revenue, COGS,
    SG&A, Depreciation & Amortization, interest expense и налога на прибыль.
  tax:
    profit_tax_rate:
      value: 0.25
  revenue_block:
    total_revenue:
      formula: workplace_ai_revenue + contact_center_ai_revenue
  cogs_block:
    total_cogs: total_datacenter_opex + total_team_opex + annual_gpu_rental_cost
  gross_profit:
    formula: total_revenue - total_cogs
  sga_block:
    total_sga:
      source: sga.total_sga
  ebitda:
    formula: gross_profit - total_sga
  depreciation_and_amortization_block:
    total_ppe_depreciation:
      source: depreciation_and_amortization.total_ppe_depreciation
    total_ip_amortization:
      source: depreciation_and_amortization.total_ip_amortization
    total_depreciation_and_amortization:
      source: depreciation_and_amortization.total_depreciation_and_amortization
  ebit:
    formula: ebitda - total_depreciation_and_amortization
  interest_expense:
    source: funding.interest_expense
  ebt:
    formula: ebit - interest_expense
  profit_tax:
    formula: max(ebt, 0) * profit_tax_rate
  net_income:
    formula: ebt - profit_tax

cash_flow:
  currency: RUB
  description: >
    Cash Flow Statement GPS. Строится на основе P&L, CAPEX и Funding.
  opening_cash_balance:
    2026: 0
  operating_cash_flow:
    net_income:
      source: pnl.net_income
    depreciation_and_amortization:
      source: pnl.depreciation_and_amortization_block.total_depreciation_and_amortization
    operating_cash_flow:
      formula: net_income + total_depreciation_and_amortization
  investing_cash_flow:
    gpu_infra_capex:
      source: capex.gpu_infra_capex
    datacenter_construction_capex:
      source: capex.datacenter_construction_capex
    office_capex:
      source: capex.total_office_capex
    intangible_capex:
      source: capex.intangible_capex
    investing_cash_flow:
      formula: -gpu_infra_capex -datacenter_construction_capex -office_capex -intangible_capex
  pre_financing_cash_flow:
    formula: operating_cash_flow + investing_cash_flow
  financing_cash_flow:
    equity_injection:
      source: funding.equity_injection
    revolver_drawdown:
      source: funding.revolver_drawdown
    revolver_repayment:
      source: funding.revolver_repayment
    financing_cash_flow:
      formula: equity_injection + revolver_drawdown - revolver_repayment
  net_cash_flow:
    formula: pre_financing_cash_flow + financing_cash_flow
  cash_balance:
    opening_cash:
      formula: previous_year_closing_cash
    closing_cash:
      formula: opening_cash + net_cash_flow
    cumulative_cash:
      formula: cumulative_previous_year + net_cash_flow

funding:
  currency: RUB
  description: >
    Funding model GPS. Используется для покрытия отрицательного cash balance
    через equity, revolver или mix.
  active_scenario: mix
  scenarios:
    equity_only:
      equity_share:
        value: 1.0
      revolver_share:
        value: 0.0
    revolver_only:
      equity_share:
        value: 0.0
      revolver_share:
        value: 1.0
    mix:
      description: >
        Funding need покрывается комбинацией equity и revolver.
        Доли задаются пользователем вручную.
      equity_share:
        value: 0.50
      revolver_share:
        value: 0.50
      validation:
        formula: equity_share + revolver_share = 1.0
  revolver:
    interest_rate:
      2026: 0.25
      2027: 0.25
      2028: 0.25
      2029: 0.25
      2030: 0.25
    repayment_logic:
      minimum_cash_balance:
        description: >
          Минимальный остаток денежных средств для операционной устойчивости.
          Рассчитывается как 1 месяц фиксированных расходов GPS:
          team OPEX + SG&A + GPU rental OPEX.
        months_of_fixed_costs:
          value: 1
        calculation_logic:
          monthly_team_opex: total_team_opex / 12
          monthly_sga: total_sga / 12
          monthly_gpu_rental_opex: annual_gpu_rental_cost / 12
          minimum_cash_balance: (monthly_team_opex + monthly_sga + monthly_gpu_rental_opex) * months_of_fixed_costs
  calculation_logic:
    closing_cash_before_funding: opening_cash + net_cash_flow
    funding_need: max(-closing_cash_before_funding, 0)
    equity_injection: funding_need * equity_share
    revolver_drawdown: funding_need * revolver_share
    cash_after_drawdown: closing_cash_before_funding + equity_injection + revolver_drawdown
    opening_revolver_balance: previous_year_closing_revolver_balance
    excess_cash_available_for_repayment: max(cash_after_drawdown - minimum_cash_balance, 0)
    revolver_repayment: min(excess_cash_available_for_repayment, opening_revolver_balance)
    revolver_balance: opening_revolver_balance + revolver_drawdown - revolver_repayment
    average_revolver_balance: (opening_revolver_balance + revolver_balance) / 2
    interest_expense: average_revolver_balance * revolver_interest_rate
    closing_cash_after_funding: cash_after_drawdown - revolver_repayment

balance_sheet:
  currency: RUB
  description: >
    Balance Sheet GPS. Строится на основе Cash Flow, CAPEX,
    Intangible Assets, Funding и P&L.
  assets:
    current_assets:
      cash:
        source: funding.closing_cash_after_funding
    non_current_assets:
      ppe:
        gross_ppe: cumulative_gpu_infra_capex + cumulative_datacenter_construction_capex + cumulative_office_capex
        accumulated_depreciation: cumulative_total_ppe_depreciation
        net_ppe: gross_ppe - accumulated_depreciation
      intangible_assets:
        gross_intangible_assets: cumulative_workplace_ai_ip_value + cumulative_contact_center_ai_ip_value
        accumulated_amortization: cumulative_total_ip_amortization
        net_intangible_assets: gross_intangible_assets - accumulated_amortization
    total_assets: cash + net_ppe + net_intangible_assets
  liabilities:
    debt:
      revolver_balance:
        source: funding.revolver_balance
    total_liabilities: revolver_balance
  equity:
    paid_in_capital: cumulative_equity_injection
    retained_earnings: previous_retained_earnings + net_income - dividends
    total_equity: paid_in_capital + retained_earnings
  balance_check: total_assets - total_liabilities - total_equity

investment_metrics:
  currency: RUB
  description: >
    DCF / Investment Metrics model GPS.
    Используется для оценки инвестиционной привлекательности
    сценариев build_own_dc / rent_gpu_only / hybrid.
  discount_rate:
    description: >
      Discount rate / WACC proxy для DCF модели.
      Используется как hurdle rate для IC.
      Должен быть editable parameter.
    value:
      2026: 0.30
  free_cash_flow:
    operating_cash_flow:
      source: cash_flow.operating_cash_flow.operating_cash_flow
    investing_cash_flow:
      source: cash_flow.investing_cash_flow.investing_cash_flow
    free_cash_flow: operating_cash_flow + investing_cash_flow
  discounted_cash_flow:
    discount_factor: 1 / (1 + discount_rate)^year_index
    discounted_fcf: free_cash_flow * discount_factor
  valuation:
    npv: sum(discounted_fcf)
    irr: IRR(free_cash_flow_series)
  payback:
    simple_payback: first_year(cumulative_cash > 0)
    discounted_payback: first_year(cumulative_discounted_fcf > 0)
  scenario_comparison:
    compare_by:
      - build_own_dc
      - rent_gpu_only
      - hybrid
    metrics:
      - npv
      - irr
      - simple_payback
      - discounted_payback
    wide_format: true
  return_metrics:
    description: >
      Метрики доходности и эффективности капитала GPS.
    roic:
      formula: nopat / average_invested_capital
      components:
        nopat: ebit * (1 - profit_tax_rate)
        invested_capital: net_ppe + net_intangible_assets
        average_invested_capital: (invested_capital_beginning + invested_capital_ending) / 2
    roe:
      formula: net_income / average_equity
      components:
        average_equity: (total_equity_beginning + total_equity_ending) / 2
    roa:
      formula: net_income / average_total_assets
      components:
        average_total_assets: (total_assets_beginning + total_assets_ending) / 2
    debt_to_equity: revolver_balance / total_equity
    net_debt: revolver_balance - cash
    net_debt_to_ebitda: net_debt / ebitda
    interest_coverage:
      formula: ebit / interest_expense
      fallback: N/A if interest_expense <= 0
  sensitivity_analysis:
    description: >
      Sensitivity analysis для ключевых драйверов инвестиционной модели GPS.
    active_cases:
      - base
      - downside
      - upside
    drivers:
      discount_rate:
        base: 0.30
        downside: 0.35
        upside: 0.25
      target_contribution_margin:
        base_multiplier: 1.00
        downside_multiplier: 0.85
        upside_multiplier: 1.15
      token_capacity_utilization:
        base_multiplier: 1.00
        downside_multiplier: 0.80
        upside_multiplier: 1.20
      gpu_unit_cost:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      gpu_rental_price:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      electricity_price:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      fx_usd_rub:
        base_multiplier: 1.00
        downside_multiplier: 1.15
        upside_multiplier: 0.90
    output_metrics:
      - npv
      - irr
      - simple_payback
      - discounted_payback
      - roic
      - roe
      - net_debt_to_ebitda