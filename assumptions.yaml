years:
  - 2026
  - 2027
  - 2028
  - 2029
  - 2030

fx_assumptions:
  description: >
    Базовые валютные assumptions модели.
    Используются для пересчета USD-бенчмарков в RUB.
  usd_rub:
    base_year: 2026
    base_value: 80
    annual_growth:
      2027: 0.07
      2028: 0.07
      2029: 0.07
      2030: 0.07
    calculation_logic:
      fx_2026: base_value
      fx_t: fx_previous_year * (1 + annual_growth_t)

inflation_assumptions:
  description: >
    Рублевая инфляция для индексации SG&A, офисных расходов
    и прочих рублевых затрат.
  rub_inflation:
    base_year: 2026
    annual_growth:
      2026: 0.00
      2027: 0.07
      2028: 0.06
      2029: 0.05
      2030: 0.05
    calculation_logic:
      index_2026: 1.0
      index_t: "index_previous_year * (1 + annual_growth_t)"

products: # продуктовый портфель и модель реализации
  - name: Workplace.ai
    type: internal_ai_employee
    users: all_bank_employees
    description: >
      ИИ-платформа для работы сотрудников с корпоративными знаниями,
      документами и внутренними процессами, включая агентные функции, генерацию
      текста и изображений.
    token_distribution_assumption: 0.6 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      interactive: 0.8
      agentic: 0.2
    components: # база для затрат на разработку и архитектуру
      - LLM_fine_tuning
      - RAG_knowledge_access
      - document_generation
      - corporate_chat_assistant
      - agentic_actions # HR, requests, workflows
    rollout:
      model: rapid_scaling
      driver: employee_adoption
  - name: Contact_Center.ai
    type: customer_interaction_ai
    users: contact_center + clients
    description: >
      ИИ-платформа для автоматизации клиентского взаимодействия,
      включая ИИ-операторов, ассистентов операторов, голосовые каналы
      и агентное выполнение бизнес-процессов.
    token_distribution_assumption: 0.4 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      chat_real_time: 0.5
      voice_processing: 0.3
      post_processing: 0.2
    components: # база для затрат на разработку и архитектуру
      - AI_operator
      - operator_assistant
      - voice_layer # external STT/TTS
      - conversation_analytics
      - agentic_execution_layer
    rollout:
      stages:
      - operator_assistant
      - partial_automation
      - full_ai_operator
      - voice_enablement

growth_drivers: # определяем драйверы роста реализации продуктов
  Workplace.ai:
    - employee_adoption
    - queries_per_user
  Contact_Center.ai:
    - automation_rate
    - interactions_volume
    - voice_share_growth

technology:
  LLM:
    deployment: on premise
    ownership: GPS
  voice:
    stt_tts: external_solution
    integration: GPS
  agent:
    development: GPS
    orchestration: GPS

usage_assumptions:
  Workplace.ai:
    total_employees: 27000
    activation_rate:
      2026: 0.15
      2027: 0.25
      2028: 0.40
      2029: 0.75
      2030: 0.90
    usage_metric: tokens_per_active_user_per_day
  Contact_Center.ai:
    interactions_per_day: 36870
    tokens_per_interaction: 25400
    automation_rate: # сколько обращений обрабатывает AI
      2026: 0.05
      2027: 0.15
      2028: 0.30
      2029: 0.45
      2030: 0.60
    channels:
      voice_share: # text_share = 1 - voice_share
        2026: 0.0
        2027: 0.1
        2028: 0.25
        2029: 0.4
        2030: 0.5
    usage_metric: tokens_per_interaction

token_load_model:
  time_assumptions:
    working_days_per_year: 247
    calendar_days_per_year: 365
  Workplace.ai:
    metric: tokens_per_active_user_per_day
    formula: active_users * tokens_per_active_user_per_day * working_days_per_year
    tokens_per_active_user_per_day:
      2026: 25000
      2027: 66000
      2028: 119000
      2029: 182000
      2030: 227000
  Contact_Center.ai:
    metric: tokens_per_interaction
    formula: interactions_per_day * automation_rate * tokens_per_interaction * calendar_days_per_year

compute_model: # перевод токенов в нагрузку и GPU
  model_mix:
    2026:
      frontier: 0.15
      large: 0.5
      medium: 0.25
      small: 0.1
    2027:
      frontier: 0.2
      large: 0.4
      medium: 0.28
      small: 0.12
    2028:
      frontier: 0.25
      large: 0.3
      medium: 0.28
      small: 0.17
    2029:
      frontier: 0.22
      large: 0.25
      medium: 0.3
      small: 0.23
    2030:
      frontier: 0.18
      large: 0.22
      medium: 0.32
      small: 0.28
  throughput_per_gpu: # производительность моделей (токенов в сек на GPU)
    frontier: 80
    large: 450
    medium: 2500
    small: 6000
  weighted_throughput: # средняя производительность всех моделей
    calculation:
      type: harmonic_mean
      formula: "1 / sum(share / throughput)"
      depends_on:
        - compute_model.model.mix
        - compute_model.throughput_per_gpu
  infra:
    gpu_type: H100
    utilization: # доля времени в которое GPU работает над задачами, остальное: переключение, оркестрация, ошибки
      2026: 0.35
      2027: 0.40
      2028: 0.45
      2029: 0.50
      2030: 0.55 # растет в результате роста эффективности: лучше оркестрация, routing
    working_hours_per_day: 12
    peak_factor: 1.0

gpu_calculation: # считаем количество GPU
  annual_tokens_to_tokens_per_second:
    method: annual_tokens / (working_days_per_year * working_hours_per_day) * 3600
    source:
      working_days_per_year: token_load_model.time_assumptions.working_days_per_year
      working_hours_per_day: compute_model.infra.working_hours_per_day
  required_gpu:
    method: tokens_per_second / (weighted_throughput * utilization) * peak_factor
    source:
      tokens_per_second: gpu_calculation.annual_tokens_to_tokens_per_second
      weighted_throughput: compute_model.weighted_throughput
      utilization: compute_model.infra.utilization
      peak_factor: compute_model.infra.peak_factor

capex:
  currency: RUB
  gpu:
    type: H100
    unit_cost: 3000000
    purchase_logic: required_gpu_per_year
    useful_life_years: 5
  infra_multiplier:
    description: >
      множитель на GPU для учета серверов, стоек, сети, хранения,
      инженерной инфраструктуры ЦОД и резерва
    value: 1.5
  capex_formula:
    gpu_capex: owned_gpu_increment * gpu.unit_cost
    gpu_infra_capex: gpu_capex * infra_multiplier.value
    datacenter_construction_capex: total_component_rub * construction_flag
    office_capex: total_office_capex
    intangible_capex: workplace_ai_ip_value + contact_center_ai_ip_value
    tangible_capex: gpu_infra_capex + datacenter_construction_capex + office_capex
    total_capex: tangible_capex + intangible_capex
  depreciation:
    method: straight_line
    useful_life_years: 5
    depreciable_base: gpu_infra_capex + datacenter_construction_capex + office_capex

  strategy_scenarios:
    description: >
      Сценарии инфраструктурной стратегии GPS:
      1. build_own_dc — строим собственный ЦОД сразу
      2. rent_gpu_only — арендуем GPU весь горизонт
      3. hybrid — сначала аренда GPU, затем строительство ЦОДа
    active_scenario: hybrid
    scenarios:
      build_own_dc:
        description: >
          Строительство собственного ЦОДа со старта проекта.
          Запуск на собственной инфраструктуре.
        construction_start_year: 2026
        construction_flag:
          2026: 1
          2027: 0
          2028: 0
          2029: 0
          2030: 0
      rent_gpu_only:
        description: >
          Полная аренда GPU без строительства собственного ЦОДа.
          Используется при ограничениях по регулированию,
          скорости запуска или снижении CAPEX-риска.
        construction_start_year: null
        construction_flag:
          2026: 0
          2027: 0
          2028: 0
          2029: 0
          2030: 0
      hybrid:
        description: >
          Сначала аренда GPU для проверки жизнеспособности модели,
          затем строительство собственного ЦОДа.
        construction_start_year: 2028
        construction_flag:
          2026: 0
          2027: 0
          2028: 1
          2029: 0
          2030: 0
    allocation_logic:
      description: >
        Распределение required_gpu между арендой и собственными GPU
        зависит от активного сценария.
      rules:
        build_own_dc:
          description: >
            Собственный ЦОД с самого начала, все GPU покупаются.
          rented_gpu: 0
          owned_gpu: required_gpu
        rent_gpu_only:
          description: >
            Собственный ЦОД не строится, все GPU арендуются.
          rented_gpu: required_gpu
          owned_gpu: 0
        hybrid:
          description: >
            До года строительства используется аренда, после строительства — собственные GPU.
          before_construction:
            rented_gpu: required_gpu
            owned_gpu: 0
          from_construction_year:
            rented_gpu: 0
            owned_gpu: required_gpu

  owned_gpu_increment_logic:
    description: >
      Прирост только собственных GPU, для rented GPU CAPEX не возникает.
    formula:
      2026: owned_gpu
      next_years: max(owned_gpu_current - owned_gpu_previous, 0)

  datacenter_construction: # capex
    description: >
      CAPEX строительства собственного ЦОДа рассчитывается
      от максимальной требуемой GPU-нагрузки GPS за горизонт модели.
    sizing_logic:
      description: >
        Размер ЦОДа определяется по пиковой нагрузке GPU:
        max(required_gpu) → MW → округление вверх
      calculation_logic:
        peak_required_gpu: max(required_gpu)
        it_load_mw: peak_required_gpu * gpu_power_kw / 1000
        total_load_mw: it_load_mw * pue
        target_capacity_mw: ceil(total_load_mw)
    benchmark_capacity_mw: 3
    benchmark_components_3mw_usd_mln:
      power_infrastructure: 3.25
      ups_n_plus_1: 2.70
      dgu_n_plus_1: 2.65
      containers: 6.00
      other: 8.00
      total: 22.60
    calculation_logic:
      component_target_usd: component_3mw_usd * target_capacity_mw / benchmark_capacity_mw
      component_target_rub: component_target_usd * fx_usd_rub_t
      datacenter_construction_capex: total_component_rub * construction_flag

  intangible_assets:
    currency: RUB
    description: >
      Intangible Assets (capitalized development costs) for proprietary AI products:
      Workplace.ai and Contact_Center.ai.
      В balance sheet отражаются как капитализированные затраты на разработку IP,
      а не как PP&E.
    amortization:
      method: straight_line
      useful_life_years: 5
    development_assumptions:
      development_infrastructure_percent:
        description: >
          Development GPU / sandbox / experimentation /
          vector DB / fine-tuning infrastructure.
        value: 0.15
      data_acquisition_percent:
        description: >
          Data acquisition / annotation / synthetic datasets / domain corpora /
          evaluation datasets.
        value: 0.10
    eligible_core_team_roles:
      description: >
        Только эти роли core team капитализируются в Intangible Assets.
        Остальные остаются в OPEX / SG&A.
      roles:
        leadership:
          - head_of_ai
        genai_team:
          - genai_lead
          - llm_engineer
          - ml_engineer
          - data_engineer
        platform_team:
          - platform_lead
          - backend_engineer
          - ai_platform_engineer
          - devops_engineer
        agent_team:
          - agent_lead
          - agent_engineer
          - business_analyst
        architecture_team:
          - chief_architect
          - solution_architect
        mlops_team:
          - mlops_lead
          - ml_engineer
          - devops_engineer
        validation_team:
          - qa_lead
          - qa_engineer
        data_team:
          - data_lead
          - data_labeling_specialist
    products:
      workplace_ai:
        build_period_months: 6
        go_live_year: 2026
        go_live_month: 7
        effort_share_of_core_team:
          value: 0.70
        calculation_logic:
          eligible_core_team_payroll: payroll_of_eligible_roles
          capitalized_payroll: eligible_core_team_payroll * effort_share_of_core_team
          capitalized_sfr: capitalized_payroll * sfr_rate
          development_infrastructure_cost: capitalized_payroll * development_infrastructure_percent
          data_acquisition_cost: capitalized_payroll * data_acquisition_percent
          total_ip_asset_value: capitalized_payroll + capitalized_sfr + development_infrastructure_cost + data_acquisition_cost
      contact_center_ai:
        build_period_months: 6
        go_live_year: 2026
        go_live_month: 7
        effort_share_of_core_team:
          value: 0.30
        calculation_logic:
          eligible_core_team_payroll: payroll_of_eligible_roles
          capitalized_payroll: eligible_core_team_payroll * effort_share_of_core_team
          capitalized_sfr: capitalized_payroll * sfr_rate
          development_infrastructure_cost: capitalized_payroll * development_infrastructure_percent
          data_acquisition_cost: capitalized_payroll * data_acquisition_percent
          total_ip_asset_value: capitalized_payroll + capitalized_sfr + development_infrastructure_cost + data_acquisition_cost
    html_output:
      wide_format: true
      tables:
        intangible_assets:
          - workplace_ai_ip_value
          - contact_center_ai_ip_value
          - total_intangible_assets
          - annual_ip_amortization

  office_capex:
    description: >
      Корпоративный CAPEX GPS, не связанный с production AI infrastructure.
      Включает офисное оборудование, рабочие устройства сотрудников
      и базовую офисную инфраструктуру.
    office_server:
      description: >
        Корпоративный сервер для AD, file services, backup, monitoring и внутренних сервисов.
      quantity:
        value: 1
      unit_cost_rub:
        value: 2500000
      useful_life_years:
        value: 5
    employee_laptops:
      description: >
        Ноутбуки для core team и SG&A сотрудников. 1 ноутбук на 1 FTE.
      allocation_logic:
        formula: total_fte
      unit_cost_rub:
        value: 180000
      useful_life_years:
        value: 3
    executive_laptops:
      description: >
        Ноутбуки для руководителей: CEO, CFO, COO, Head of AI, Chief Architect.
      quantity:
        value: 5
      unit_cost_rub:
        value: 350000
      useful_life_years:
        value: 3
    mfu:
      description: >
        МФУ / принтеры. 1 устройство на 30–40 сотрудников.
      quantity:
        value: 4
      unit_cost_rub:
        value: 120000
      useful_life_years:
        value: 5
    meeting_rooms:
      description: >
        Оснащение переговорных комнат: VC systems, displays, conference equipment.
      quantity:
        value: 3
      total_cost_rub:
        value: 1500000
      useful_life_years:
        value: 5
    office_furniture:
      description: >
        Стартовый CAPEX на мебель и базовое оснащение отдельного офиса GPS.
      total_cost_rub:
        value: 8000000
      useful_life_years:
        value: 7
    calculation_logic:
      office_server_capex: >
        quantity * unit_cost_rub
      employee_laptops_capex: >
        total_fte * unit_cost_rub
      executive_laptops_capex: >
        quantity * unit_cost_rub
      mfu_capex: >
        quantity * unit_cost_rub
      meeting_rooms_capex: >
        total_cost_rub
      office_furniture_capex: >
        total_cost_rub
      total_office_capex: >
        office_server_capex +
        employee_laptops_capex +
        executive_laptops_capex +
        mfu_capex +
        meeting_rooms_capex +
        office_furniture_capex

opex:
  gpu_rental: # opex
    description: >
      Аренда GPU до момента запуска собственного ЦОДа
      или на всем горизонте в сценарии rent_gpu_only.
    rental_price_per_gpu_per_year:
      currency: RUB
      value: 1800000
    calculation_logic:
      annual_gpu_rental_cost: required_gpu * rental_price_per_gpu_per_year
  datacenter:
    description: >
      OPEX ЦОДа рассчитывается от нагрузки GPU через установленную мощность (МВт), 
      затем через PUE переводится в полную мощность объекта.
    drivers:
      gpu_power_kw:
        value: 2.5 # ИТ-мощность на 1 GPU, кВт
      pue: # коэффициент эффективности ЦОДа
        value: 1.25
      operating_hours_per_day:
        value: 24
      calendar_days_per_year:
        value: 365
      electricity_price:
        currency: RUB
        unit: kWh
        base_year: 2026
        base_price_per_kwh: 5
        annual_growth:
          2027: 0.1
          2028: 0.08
          2029: 0.06
          2030: 0.04
        calculation_logic:
          price_2026: base_price_per_kwh
          price_t: price_previous_year * (1 + annual_growth_t)
      maintenance_percent_of_capex:
        value: 0.05
      network_cost_per_mw_per_year:
        value: 400
      land_rent_per_mw_per_year:
        value: 3000000
      other_opex_percent:
        value: 0.05
    calculation_logic:
      average_gpu: (gpu_beginning_of_year + gpu_end_of_year) / 2
      it_load_mw: average_gpu * gpu_power_kw / 1000
      total_load_mw: it_load_mw * pue
      electricity_kwh: total_load_mw * 1000 * operating_hours_per_day * calendar_days_per_year
      electricity_cost: electricity_kwh * electricity_price_t
      maintenance_cost: capex.total_capex * maintenance_percent_of_capex
      network_cost: total_load_mw * network_cost_per_mw_per_year
      land_rent: total_load_mw * land_rent_per_mw_per_year
      other_opex: base_opex * other_opex_percent

  team:
    payroll_assumptions:
      description: >
        расчет ФОТ: gross salary + bonus + social contribution
      bonus_percent_of_gross:
        value: 0.2
      social_contribution_sfr_percent_of_gross:
        value: 0.3
      salary_growth:
        2026: 0.0
        2027: 0.12
        2028: 0.10
        2029: 0.08
        2030: 0.06
      calculation_logic:
        annual_gross_salary: monthly_gross_salary * 12
        annual_bonus: annual_gross_salary * bonus_percent_of_gross
        annual_social_contribution_sfr: (annual_gross_salary + annual_bonus) * social_contribution_sfr_percent_of_gross
        annual_fully_loaded_cost_per_fte: annual_gross_salary + annual_bonus + annual_social_contribution_sfr
        annual_team_cost: fte * annual_fully_loaded_cost_per_fte
