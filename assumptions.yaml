# Продуктовый портфель и модель реализации
products:
  - name: Workplace.ai
    type: internal_ai_employee
    users: all_bank_employees
    description: >
      ИИ-платформа для работы сотрудников с корпоративными знаниями,
      документами и внутренними процессами, включая агентные функции, генерацию
      текста и изображений.
    token_distribution_assumption: 0.6 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      interactive: 0.8
      agentic: 0.2
    components: # база для затрат на разработку и архитектуру
      - LLM_fine_tuning
      - RAG_knowledge_access
      - document_generation
      - corporate_chat_assistant
      - agentic_actions # HR, requests, workflows
    rollout:
      model: rapid_scaling
      driver: employee_adoption
  - name: Contact_Center.ai
    type: customer_interaction_ai
    users: contact_center + clients
    description: >
      ИИ-платформа для автоматизации клиентского взаимодействия,
      включая ИИ-операторов, ассистентов операторов, голосовые каналы
      и агентное выполнение бизнес-процессов.
    token_distribution_assumption: 0.4 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      chat_real_time: 0.5
      voice_processing: 0.3
      post_processing: 0.2
    components: # база для затрат на разработку и архитектуру
      - AI_operator
      - operator_assistant
      - voice_layer # external STT/TTS
      - conversation_analytics
      - agentic_execution_layer
    rollout:
      stages:
      - operator_assistant
      - partial_automation
      - full_ai_operator
      - voice_enablement

growth_drivers: # определяем драйверы роста реализации продуктов
  Workplace.ai:
    - employee_adoption
    - queries_per_user
  Contact_Center.ai:
    - automation_rate
    - interactions_volume
    - voice_share_growth

technology:
  LLM:
    deployment: on premise
    ownership: GPS
  voice:
    stt_tts: external_solution
    integration: GPS
  agent:
    development: GPS
    orchestration: GPS

usage_assumptions:
  Workplace.ai:
    total_employees: 27000
    activation_rate:
      2026: 0.15
      2027: 0.25
      2028: 0.40
      2029: 0.75
      2030: 0.90
    usage_metric: tokens_per_active_user_per_day
  Contact_Center.ai:
    interactions_per_day: 36870
    tokens_per_interaction: 25400
    automation_rate: # сколько обращений обрабатывает AI
      2026: 0.05
      2027: 0.15
      2028: 0.30
      2029: 0.45
      2030: 0.60
    channels:
      voice_share: # text_share = 1 - voice_share
        2026: 0.0
        2027: 0.1
        2028: 0.25
        2029: 0.4
        2030: 0.5
    usage_metric: tokens_per_interaction

token_load_model:
  time_assumptions:
    working_days_per_year: 247
    calendar_days_per_year: 365
  Workplace.ai:
    metric: tokens_per_active_user_per_day
    formula: active_users * tokens_per_active_user_per_day * working_days_per_year
    tokens_per_active_user_per_day:
      2026: 25000
      2027: 66000
      2028: 119000
      2029: 182000
      2030: 227000
  Contact_Center.ai:
    metric: tokens_per_interaction
    formula: interactions_per_day * automation_rate * tokens_per_interaction * calendar_days_per_year

compute_model: # перевод токенов в нагрузку и GPU
  model_mix:
    2026:
      frontier: 0.15
      large: 0.5
      medium: 0.25
      small: 0.1
    2027:
      frontier: 0.2
      large: 0.4
      medium: 0.28
      small: 0.12
    2028:
      frontier: 0.25
      large: 0.3
      medium: 0.28
      small: 0.17
    2029:
      frontier: 0.22
      large: 0.25
      medium: 0.3
      small: 0.23
    2030:
      frontier: 0.18
      large: 0.22
      medium: 0.32
      small: 0.28
  throughput_per_gpu: # производительность моделей (токенов в сек на GPU)
    frontier: 80
    large: 450
    medium: 2500
    small: 6000
  weighted_throughput: # средняя производительность всех моделей
    calculation:
      type: harmonic_mean
      formula: "1 / sum(share / throughput)"
      depends_on:
        - compute_model.model.mix
        - compute_model.throughput_per_gpu
  infra:
    gpu_type: H100
    utilization: # доля времени в которое GPU работает над задачами, остальное: переключение, оркестрация, ошибки
      2026: 0.35
      2027: 0.40
      2028: 0.45
      2029: 0.50
      2030: 0.55 # растет в результате роста эффективности: лучше оркестрация, routing
    working_hours_per_day: 12
    peak_factor: 1.0

gpu_calculation: # считаем количество GPU
  annual_tokens_to_tokens_per_second:
    method: annual_tokens / (working_days_per_year * working_hours_per_day) * 3600
    source:
      working_days_per_year: token_load_model.time_assumptions.working_days_per_year
      working_hours_per_day: compute_model.infra.working_hours_per_day
  required_gpu:
    method: tokens_per_second / (weighted_throughput * utilization) * peak_factor
    source:
      tokens_per_second: gpu_calculation.annual_tokens_to_tokens_per_second
      weighted_throughput: compute_model.weighted_throughput
      utilization: compute_model.infra.utilization
      peak_factor: compute_model.infra.peak_factor

capex:
  currency: RUB
  gpu:
    type: H100
    unit_cost: 3000000
    purchase_logic: required_gpu_per_year
    useful_life_years: 5
  infra_multiplier:
    description: >
      множитель на GPU для учета серверов, стоек, сети, хранения,
      инженерной инфраструктуры ЦОД и резерва
    value: 1.5
  capex_formula:
    gpu_capex: required_gpu_increment * gpu.unit_cost
    total_capex: gpu_capex * infra_multiplier.value
  depreciation:
    method: straight_line
    useful_life_years: 5

datacenter: # opex
  description: >
    OPEX ЦОДа рассчитывается от нагрузки GPU через установленную мощность (МВт), 
    затем через PUE переводится в полную мощность объекта.
  drivers:
    gpu_power_kw:
      value: 2.5 # ИТ-мощность на 1 GPU, кВт
    pue: # коэффициент эффективности ЦОДа
      value: 1.25
    operating_hours_per_day:
      value: 24
    calendar_days_per_year:
      value: 365
    electricity_price:
      currency: RUB
      unit: kWh
      base_year: 2026
      base_price_per_kwh: 5
      annual_growth:
        2027: 0.1
        2028: 0.08
        2029: 0.06
        2030: 0.04
      calculation_logic:
        price_2026: base_price_per_kWh
        price_t: price_previous_year * (1 + annual_growth_t)
    maintenance_percent_of_capex:
      value: 0.05
    network_cost_per_mw_per_year:
      value: 400
    land_rent_per_mw_per_year:
      value: 3000000
    other_opex_percent:
      value: 0.05
  calculation_logic:
    average_gpu: (gpu_beginning_of_year + gpu_end_of_year) / 2
    it_load_mw: average_gpu * gpu_power_kw / 1000
    total_load_mw: it_load_mw * pue
    electricity_kwh: total_load_mw * 1000 * operating_hours_per_day * calendar_days_per_years
    electricity_cost: electricity_kwh * electricity_price_t
    maintenance_cost: capex.total_capex * maintenance_percent_of_capex
    network_cost: total_load_mw * network_cost_per_mw_per_year
    land_rent: total_load_mw * land_rent_per_mw_per_year
    other_opex: base_opex * other_opex_percent

team:
  payroll_assumptions:
    description: >
      расчет ФОТ: gross salary + bonus + social contribution
    bonus_percent_of_gross:
      value: 0.2
    social_contribution_sfr_percent_of_gross:
      value: 0.3
    salary_growth:
      2026: 0.0
      2027: 0.12
      2028: 0.10
      2029: 0.08
      2030: 0.06
    calculation_logic:
      annual_gross_salary: monthly_gross_salary * 12
      annual_bonus: annual_gross_salary * bonus_percent_of_gross
      annual_social_contribution_sfr: (annual_gross_salary + annual_bonus) * social_contribution_sfr_percent_of_gross
