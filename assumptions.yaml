years:
  - 2026
  - 2027
  - 2028
  - 2029
  - 2030

fx_assumptions:
  description: >
    Базовые валютные assumptions модели.
    Используются для пересчета USD-бенчмарков в RUB.
  usd_rub:
    base_year: 2026
    base_value: 80
    annual_growth:
      2027: 0.07
      2028: 0.07
      2029: 0.07
      2030: 0.07
    calculation_logic:
      fx_2026: base_value
      fx_t: fx_previous_year * (1 + annual_growth_t)

inflation_assumptions:
  description: >
    Рублевая инфляция для индексации SG&A, офисных расходов
    и прочих рублевых затрат.
  rub_inflation:
    base_year: 2026
    annual_growth:
      2026: 0.00
      2027: 0.07
      2028: 0.06
      2029: 0.05
      2030: 0.05
    calculation_logic:
      index_2026: 1.0
      index_t: index_previous_year * (1 + annual_growth_t)

products: # продуктовый портфель и модель реализации
  - name: Workplace.ai
    type: internal_ai_employee
    users: all_bank_employees
    description: >
      ИИ-платформа для работы сотрудников с корпоративными знаниями,
      документами и внутренними процессами, включая агентные функции, генерацию
      текста и изображений.
    token_distribution_assumption: 0.6 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      interactive: 0.8
      agentic: 0.2
    components: # не влияет на модель база для будущей детализации затрат на разработку и архитектуру
      - LLM_fine_tuning
      - RAG_knowledge_access
      - document_generation
      - corporate_chat_assistant
      - agentic_actions # HR, requests, workflows
  - name: Contact_Center.ai
    type: customer_interaction_ai
    users: contact_center + clients
    description: >
      ИИ-платформа для автоматизации клиентского взаимодействия,
      включая ИИ-операторов, ассистентов операторов, голосовые каналы
      и агентное выполнение бизнес-процессов.
    token_distribution_assumption: 0.4 # потребление токенов в портфеле
    consumption_type: # потребление токенов в продукте
      chat_real_time: 0.5
      voice_processing: 0.3
      post_processing: 0.2
    components: # не влияет на модель база для будущей детализации затрат на разработку и архитектуру
      - AI_operator
      - operator_assistant
      - voice_layer # external STT/TTS
      - conversation_analytics
      - agentic_execution_layer

usage_assumptions: # спрос на стороне банка
  Workplace.ai:
    total_employees: 27000
    activation_rate: # доля ИИ-активных сотрудников
      2026: 0.15
      2027: 0.25
      2028: 0.40
      2029: 0.75
      2030: 0.90
    usage_metric: tokens_per_active_user_per_day # закладываю метрику токенов
  Contact_Center.ai:
    interactions_per_day: 36870 # всего обращений в день в КЦ
    automation_rate: # доля обращений, которые обрабатывает AI
      2026: 0.05
      2027: 0.15
      2028: 0.30
      2029: 0.45
      2030: 0.60
    usage_metric: tokens_per_interaction # закладываю метрику токенов

token_load_model:
  time_assumptions:
    working_days_per_year: 247
    calendar_days_per_year: 365
  Workplace.ai:
    metric: tokens_per_active_user_per_day
    tokens_per_active_user_per_day: # увеличивается глубина сценариев использования ИИ
      2026: 25000
      2027: 66000
      2028: 119000
      2029: 182000
      2030: 227000
    calculation_logic:
      active_users: total_employees * activation_rate
      daily_tokens: active_users * tokens_per_active_user_per_day
      annual_tokens: daily_tokens * working_days_per_year
  Contact_Center.ai:
    metric: tokens_per_interaction
    tokens_per_interaction: 25400 # предположение по среднему объему токенов на обращение (blend text / voice)
    calculation_logic:
      automated_interactions_per_day: interactions_per_day * automation_rate
      daily_tokens: automated_interactions_per_day * tokens_per_interaction
      annual_tokens: daily_tokens * calendar_days_per_year
  total_annual_tokens: Wrkplace.ai.annual_tokens + Contact_Center.ai.annual_tokens

compute_model: # перевод токенов в нагрузку и GPU
  model_mix:
    description: >
      распределение токенов по классам моделей;
      в первые годы большая доля нагрузки идёт на frontier/large модели,
      потому что продукт ещё незрелый, routing хуже, больше ручных сложных запросов 
      и меньше оптимизации. Затем по мере развития платформы часть нагрузки уходит на medium/small
      модели, потому что появляются классификация запросов, model routing, кэширование, 
      шаблонные сценарии и специализированные модели.
    2026:
      frontier: 0.15
      large: 0.5
      medium: 0.25
      small: 0.1
    2027:
      frontier: 0.2
      large: 0.4
      medium: 0.28
      small: 0.12
    2028:
      frontier: 0.25
      large: 0.3
      medium: 0.28
      small: 0.17
    2029:
      frontier: 0.22
      large: 0.25
      medium: 0.3
      small: 0.23
    2030:
      frontier: 0.18
      large: 0.22
      medium: 0.32
      small: 0.28
  throughput_per_gpu: # производительность GPU для каждого класса моделей (токенов в сек на GPU)
    frontier: 80
    large: 450
    medium: 2500
    small: 6000
  weighted_throughput: # средневзвешенная производительность GPU для всех моделей
    calculation:
      type: harmonic_mean
      formula: 1 / sum(share / throughput_per_gpu)
      depends_on:
        - compute_model.model.mix
        - compute_model.throughput_per_gpu
  infra:
    gpu_type: H100
    utilization: # доля времени в которое GPU работает над задачами, остальное: переключение, оркестрация, ошибки
      2026: 0.35
      2027: 0.40
      2028: 0.45
      2029: 0.50
      2030: 0.55 # растет в результате роста эффективности: лучше оркестрация, routing
    working_hours_per_day: 12
    peak_factor: 1.0

gpu_sizing: # считаем количество GPU
  total_annual_tokens_to_tokens_per_second:
    method: total_annual_tokens / (working_days_per_year * working_hours_per_day * 3600)
    source:
      toal_annual_tokens: token_load_model.total_annual_tokens
      working_days_per_year: token_load_model.time_assumptions.working_days_per_year
      working_hours_per_day: compute_model.infra.working_hours_per_day
  required_gpu:
    method: tokens_per_second / (weighted_throughput * utilization) * peak_factor
    source:
      tokens_per_second: gpu_sizing.total_annual_tokens_to_tokens_per_second
      weighted_throughput: compute_model.weighted_throughput
      utilization: compute_model.infra.utilization
      peak_factor: compute_model.infra.peak_factor

capex: # общие вводные по capex
  currency: RUB
  gpu:
    type: H100
    unit_cost: 3000000
    purchase_logic: owned_gpu_increment
    useful_life_years: 5
  infra_multiplier:
    description: >
      множитель на GPU для учета серверов, стоек, сети, хранения,
      инженерной инфраструктуры ЦОД и резерва
    value: 1.5
  capex_formula:
    gpu_capex: owned_gpu_increment * gpu.unit_cost
    gpu_infra_capex: gpu_capex * infra_multiplier.value
    datacenter_construction_capex: total_component_rub * construction_flag
    office_capex: total_office_capex
    intangible_capex: workplace_ai_ip_value + contact_center_ai_ip_value
    tangible_capex: gpu_infra_capex + datacenter_construction_capex + office_capex
    total_capex: tangible_capex + intangible_capex

  intangible_assets: # разработка IP на 2 продукта
    currency: RUB
    description: >
      Intangible Assets (capitalized development costs) for proprietary AI products:
      Workplace.ai and Contact_Center.ai. В balance sheet отражаются как 
      капитализированные затраты на разработку IP, а не как PP&E.
    development_assumptions:
      development_infrastructure_percent:
        description: >
          Development GPU / sandbox / experimentation /
          vector DB / fine-tuning infrastructure.
        value: 0.15
      data_acquisition_percent:
        description: >
          Data acquisition / annotation / synthetic datasets / domain corpora /
          evaluation datasets.
        value: 0.10
    eligible_core_team_roles:
      description: >
        Только эти роли core team капитализируются в Intangible Assets.
        Остальные остаются в OPEX / SG&A.
      roles:
        leadership:
          - head_of_ai
        genai_team:
          - genai_lead
          - llm_engineer
          - ml_engineer
          - data_engineer
        platform_team:
          - platform_lead
          - backend_engineer
          - ai_platform_engineer
          - devops_engineer
        agent_team:
          - agent_lead
          - agent_engineer
          - business_analyst
        architecture_team:
          - chief_architect
          - solution_architect
        mlops_team:
          - mlops_lead
          - ml_engineer
          - devops_engineer
        validation_team:
          - qa_lead
          - qa_engineer
        data_team:
          - data_lead
          - data_labeling_specialist
    products:
      workplace_ai:
        build_period_months: 6
        go_live_year: 2026
        go_live_month: 7
        effort_share_of_core_team:
          value: 0.70
        calculation_logic:
          eligible_core_team_payroll: payroll_of_eligible_roles
          capitalized_payroll: eligible_core_team_payroll * effort_share_of_core_team
          capitalized_sfr: capitalized_payroll * sfr_rate
          development_infrastructure_cost: capitalized_payroll * development_infrastructure_percent
          data_acquisition_cost: capitalized_payroll * data_acquisition_percent
          total_ip_asset_value: capitalized_payroll + capitalized_sfr + development_infrastructure_cost + data_acquisition_cost
      contact_center_ai:
        build_period_months: 6
        go_live_year: 2026
        go_live_month: 7
        effort_share_of_core_team:
          value: 0.30
        calculation_logic:
          eligible_core_team_payroll: payroll_of_eligible_roles
          capitalized_payroll: eligible_core_team_payroll * effort_share_of_core_team
          capitalized_sfr: capitalized_payroll * sfr_rate
          development_infrastructure_cost: capitalized_payroll * development_infrastructure_percent
          data_acquisition_cost: capitalized_payroll * data_acquisition_percent
          total_ip_asset_value: capitalized_payroll + capitalized_sfr + development_infrastructure_cost + data_acquisition_cost

  datacenter_construction: # строительство ЦОД
    description: >
      CAPEX строительства собственного ЦОДа рассчитывается
      от максимальной требуемой GPU-нагрузки GPS за горизонт модели.
    sizing_logic:
      description: >
        Размер ЦОДа определяется по пиковой нагрузке GPU:
        max(required_gpu) → MW → округление вверх
      calculation_logic:
        peak_required_gpu: max(required_gpu)
        it_load_mw: peak_required_gpu * gpu_power_kw / 1000
        total_load_mw: it_load_mw * pue
        target_capacity_mw: ceil(total_load_mw)
    benchmark_capacity_mw: 3
    benchmark_components_3mw_usd_mln:
      power_infrastructure: 3.25
      ups_n_plus_1: 2.70
      dgu_n_plus_1: 2.65
      containers: 6.00
      other: 8.00
      total: 22.60
    calculation_logic:
      component_target_usd: component_3mw_usd * target_capacity_mw / benchmark_capacity_mw
      component_target_rub: component_target_usd * fx_assumptions.usd_rub_t
      total_component_rub: sum(component_target_rub)
      datacenter_construction_capex: total_component_rub * construction_flag

  office_capex:
    description: >
      Корпоративный CAPEX GPS, не связанный с production AI infrastructure.
      Включает офисное оборудование, рабочие устройства сотрудников
      и базовую офисную инфраструктуру.
    purchase_year:
      value: 2026
    office_server:
      description: Корпоративный сервер для AD, file services, backup, monitoring и внутренних сервисов.
      quantity:
        value: 1
      unit_cost_rub:
        value: 2500000
    employee_laptops:
      description: >
        Ноутбуки для core team и SG&A сотрудников. 1 ноутбук на 1 FTE.
      allocation_logic:
        formula: total_fte_in_purchase_year
      unit_cost_rub:
        value: 180000
    executive_laptops:
      description: >
        Ноутбуки для руководителей: CEO, CFO, COO, Head of AI, Chief Architect.
      quantity:
        value: 5
      unit_cost_rub:
        value: 350000
    mfu:
      description: >
        МФУ / принтеры. 1 устройство на 30–40 сотрудников.
      quantity:
        value: 4
      unit_cost_rub:
        value: 120000
    meeting_rooms:
      description: >
        Оснащение переговорных комнат: VC systems, displays, conference equipment.
      quantity:
        value: 3
      unit_cost_rub:
        value: 500000
    office_furniture:
      description: >
        Стартовый CAPEX на мебель и базовое оснащение отдельного офиса GPS.
      total_cost_rub:
        value: 8000000
    calculation_logic:
      purchase_flag: year == purchase_year
      office_server_capex: quantity * unit_cost_rub * purchase_flag
      employee_laptops_capex: total_fte_in_purchase_year * unit_cost_rub * purchase_flag
      executive_laptops_capex: quantity * unit_cost_rub * purchase_flag
      mfu_capex: quantity * unit_cost_rub * purchase_flag
      meeting_rooms_capex: quantity * unit_cost_rub * purchase_flag
      office_furniture_capex: total_cost_rub * purchase_flag
      total_office_capex: office_server_capex + employee_laptops_capex + executive_laptops_capex + mfu_capex + meeting_rooms_capex + office_furniture_capex

  strategy_scenarios:
    description: >
      Сценарии инфраструктурной стратегии GPS:
      1. build_own_dc — строим собственный ЦОД сразу
      2. rent_gpu_only — арендуем GPU весь горизонт
      3. hybrid — сначала аренда GPU, затем строительство ЦОДа
    active_scenario: hybrid
    scenarios:
      build_own_dc:
        description: >
          Строительство собственного ЦОДа со старта проекта.
          Запуск на собственной инфраструктуре.
        construction_start_year: 2026
      rent_gpu_only:
        description: >
          Полная аренда GPU без строительства собственного ЦОДа.
          Используется при ограничениях по регулированию,
          скорости запуска или снижении CAPEX-риска.
        construction_start_year: null
      hybrid:
        description: >
          Сначала аренда GPU для проверки жизнеспособности модели,
          затем строительство собственного ЦОДа.
        construction_start_year: 2028
    calculation_logic:
      construction_flag: 1 if year == construction_start_year else 0
      owned_gpu:
        build_own_dc: required_gpu
        rent_gpu_only: 0
        hybrid: required_gpu if year >= construction_start_year else 0
      rented_gpu:
        build_own_dc: 0
        rent_gpu_only: required_gpu
        hybrid: required_gpu if year < construction_start_year else 0
      owned_gpu_increment:
        first_owned_year: owned_gpu
        next_years: max(owned_gpu_current - owned_gpu_previous, 0)

depreciation_and_amortization:
  description: >
    Единый блок D&A для расчета depreciation по PP&E
    и amortization по intangible assets.
  method: straight_line
  ppe_depreciation:
    useful_life_years:
      gpu_infra: 5
      datacenter_construction: 5
      office_server: 5
      employee_laptops: 3
      executive_laptops: 3
      mfu: 5
      meeting_rooms: 5
      office_furniture: 7
    depreciable_base:
      gpu_infra_capex: gpu_infra_capex
      datacenter_construction_capex: datacenter_construction_capex
      office_capex: total_office_capex
    calculation_logic:
      gpu_depreciation: gpu_infra_capex / gpu_infra_useful_life_years
      datacenter_depreciation: datacenter_construction_capex / datacenter_useful_life_years
      office_capex_depreciation: office_capex / asset_specific_useful_life_years
      total_ppe_depreciation: gpu_depreciation + datacenter_depreciation + office_capex_depreciation
  intangible_amortization:
    useful_life_years:
      ip_assets: 5
    amortizable_base:
      workplace_ai_ip_value: workplace_ai_ip_value
      contact_center_ai_ip_value: contact_center_ai_ip_value
    calculation_logic:
      workplace_ai_amortization: workplace_ai_ip_value / ip_assets_useful_life_years
      contact_center_ai_amortization: contact_center_ai_ip_value / ip_assets_useful_life_years
      total_ip_amortization: workplace_ai_amortization + contact_center_ai_amortization
  total_depreciation_and_amortization:
    formula: total_ppe_depreciation + total_ip_amortization

opex:
  gpu_rental: # opex
    description: >
      Аренда GPU до момента запуска собственного ЦОДа
      или на всем горизонте в сценарии rent_gpu_only.
    rental_price_per_gpu_per_year:
      currency: RUB
      value: 1800000
    calculation_logic:
      annual_gpu_rental_cost: rented_gpu * rental_price_per_gpu_per_year
  datacenter:
    description: >
      OPEX ЦОДа рассчитывается от нагрузки GPU через установленную мощность (МВт), 
      затем через PUE переводится в полную мощность объекта.
    drivers:
      gpu_power_kw:
        value: 2.5 # ИТ-мощность на 1 GPU, кВт
      pue: # коэффициент эффективности ЦОДа
        value: 1.25
      operating_hours_per_day:
        value: 24
      calendar_days_per_year:
        value: 365
      electricity_price:
        currency: RUB
        unit: kWh
        base_year: 2026
        base_price_per_kwh: 5
        annual_growth:
          2027: 0.1
          2028: 0.08
          2029: 0.06
          2030: 0.04
        calculation_logic:
          price_2026: base_price_per_kwh
          price_t: price_previous_year * (1 + annual_growth_t)
      maintenance_percent_of_capex:
        value: 0.05
      network_cost_per_mw_per_year:
        value: 400
      land_rent_per_mw_per_year:
        value: 3000000
      other_opex_percent:
        value: 0.05
    calculation_logic:
      average_owned_gpu: (owned_gpu_beginning_of_year + owned_gpu_end_of_year) / 2
      it_load_mw: average_owned_gpu * gpu_power_kw / 1000
      total_load_mw: it_load_mw * pue
      electricity_kwh: total_load_mw * 1000 * operating_hours_per_day * calendar_days_per_year
      electricity_cost: electricity_kwh * electricity_price_t
      datacenter_maintenance_base: cumulative_gpu_infra_capex + cumulative_datacenter_construction_capex
      maintenance_cost: datacenter_maintenance_base * maintenance_percent_of_capex
      network_cost: total_load_mw * network_cost_per_mw_per_year
      land_rent: total_load_mw * land_rent_per_mw_per_year
      datacenter_base_opex: electricity_cost + maintenance_cost + network_cost + land_rent
      other_datacenter_opex: datacenter_base_opex * other_opex_percent
      total_datacenter_opex: datacenter_base_opex + other_datacenter_opex

  team:
    payroll_assumptions:
      description: >
        расчет ФОТ: gross salary + bonus + social contribution
      bonus_percent_of_gross:
        value: 0.2
      social_contribution_sfr_percent_of_gross:
        value: 0.3
      salary_growth:
        2026: 0.0
        2027: 0.12
        2028: 0.10
        2029: 0.08
        2030: 0.06
      calculation_logic:
        monthly_gross_salary: salary_gross_monthly_rub * monthly_fte
        monthly_bonus_accrual: monthly_gross_salary * bonus_percent_of_gross
        monthly_social_contribution_sfr: (monthly_gross_salary + monthly_bonus_accrual) * social_contribution_sfr_percent_of_gross
        monthly_fully_loaded_team_cost: monthly_gross_salary + monthly_bonus_accrual + monthly_social_contribution_sfr
        annual_core_team_cash_cost: sum(monthly_fully_loaded_cost_by_role_by_month)
        build_phase_months: go_live_month - 1
        capitalized_core_team_cost: sum(monthly_fully_loaded_cost_by_role_by_month where role in eligible_core_team_roles and month < go_live_month)
        total_team_opex: annual_core_team_cash_cost - capitalized_core_team_cost
    core_team_target_fte:
      leadership:
        head_of_ai: 1
      genai_team:
        genai_lead: 1
        llm_engineer: 6
        ml_engineer: 4
        data_engineer: 3
