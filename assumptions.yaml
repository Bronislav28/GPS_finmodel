sga:
  currency: RUB
  description: >
    SG&A — постоянные административные расходы GPS.
    Расчет: gross salary + annual bonus + social contribution (SFR).
  inflation_driver: inflation_assumptions.rub_inflation
  payroll_assumptions:
    annual_bonus_percent_of_gross:
      value: 0.20
    social_contribution_sfr_percent_of_gross:
      value: 0.30
  salary_gross_monthly_rub:
    corporate_management:
      ceo_gm: 1200000
      cfo_finance_controller: 700000
      coo_operations: 700000
      legal_support: 500000
      compliance_regulatory_support: 500000
    hr:
      hrbp: 350000
      recruiter: 300000
      learning_and_development: 250000
    finance_and_accounting:
      accounting: 300000
      fpna: 400000
    admin:
      office_management: 250000
      procurement_support: 250000
    shared_corporate_services:
      audit: 250000
  calculation_logic:
    annual_gross_salary: monthly_gross_salary * 12 * inflation_index_t
    annual_bonus: annual_gross_salary * annual_bonus_percent_of_gross * worked_months_ratio
    annual_social_contribution_sfr: (annual_gross_salary + annual_bonus) * social_contribution_sfr_percent_of_gross
    annual_fully_loaded_cost: annual_gross_salary + annual_bonus + annual_social_contribution_sfr
    annual_fixed_sga: sum(annual_fully_loaded_cost)
  office_rent:
    description: >
      Аренда офиса GPS рассчитывается исходя из численности сотрудников,
      норматива площади на 1 FTE и ставки аренды за 1 м2 в месяц.
    drivers:
      sqm_per_fte:
        value: 4
      rent_rub_per_sqm_per_month_base_2026:
        value: 3500
      inflation_driver: inflation_assumptions.rub_inflation
    calculation_logic:
      total_fte: core_team_fte + sga_team_fte
      required_office_area_sqm: total_fte * sqm_per_fte
      rent_rub_per_sqm_per_month_t: rent_rub_per_sqm_per_month_base_2026 * inflation_index_t
      monthly_office_rent: required_office_area_sqm * rent_rub_per_sqm_per_month_t
      annual_office_rent: monthly_office_rent * 12
  total_sga:
    formula: annual_fixed_sga + annual_office_rent

revenue:
  currency: RUB
  description: >
    Выручка GPS рассчитывается не через заранее заданную цену токена,
    а через целевую contribution margin к OPEX. Сценарии отражают
    фактическую кривую потребления рассчитанной мощности GPS.
  consumption_scenarios:
    conservative:
      utilization_of_token_capacity:
        2026: 0.20
        2027: 0.35
        2028: 0.50
        2029: 0.65
        2030: 0.75
    base:
      utilization_of_token_capacity:
        2026: 0.30
        2027: 0.50
        2028: 0.70
        2029: 0.85
        2030: 0.95
    aggressive:
      utilization_of_token_capacity:
        2026: 0.40
        2027: 0.65
        2028: 0.85
        2029: 0.95
        2030: 1.00
  target_contribution_margin:
    conservative:
      2026: 0.10
      2027: 0.15
      2028: 0.20
      2029: 0.25
      2030: 0.30
    base:
      2026: 0.15
      2027: 0.20
      2028: 0.25
      2029: 0.30
      2030: 0.35
    aggressive:
      2026: 0.20
      2027: 0.25
      2028: 0.30
      2029: 0.35
      2030: 0.40
  product_opex_allocation:
    method: token_share
    description: >
      OPEX распределяется между продуктами пропорционально фактическому
      потреблению токенов по каждому продукту.
  calculation_logic:
    sold_tokens: available_token_capacity * utilization_of_token_capacity
    sold_tokens_by_product: available_tokens_by_product * utilization_of_token_capacity
    pricing_base: total_cogs + total_depreciation
    pricing_base_by_product: pricing_base * product_token_share
    revenue_by_product: pricing_base_by_product / (1 - target_contribution_margin)
    total_revenue: sum(revenue_by_product)
    implied_price_per_1m_tokens: revenue_by_product / sold_tokens_by_product * 1000000
    revenue_active_months: max(12 - go_live_month + 1, 0)
    revenue_availability_factor:
      2026: revenue_active_months / 12
      next_years: 1.0
    product_revenue: >
      annual_revenue_before_go_live_adjustment * revenue_availability_factor
  pricing_base_description: >
    База для расчета выручки и implied token price включает COGS и depreciation.
    SG&A не включается в pricing base и учитывается ниже в P&L при расчете EBITDA.
    Это сохраняет зависимость от infrastructure scenarios, так как depreciation зависит
    от owned GPU, строительства ЦОДа и office CAPEX.
pnl:
  currency: RUB
  description: >
    Profit & Loss model GPS. P&L строится на основе Revenue, COGS (delivery OPEX),
    SG&A, Depreciation и налога на прибыль.
  tax:
    profit_tax_rate:
      value: 0.25
  revenue_block:
    description: >
      Revenue рассчитывается через utilization scenarios
      и contribution margin logic.
    lines:
      workplace_ai_revenue:
        source: revenue.workplace_ai_revenue
      contact_center_ai_revenue:
        source: revenue.contact_center_ai_revenue
      total_revenue:
        formula: workplace_ai_revenue + contact_center_ai_revenue
  cogs_block:
    description: >
      COGS = delivery costs, необходимые для оказания AI-сервисов.
    datacenter_opex:
      electricity_cost:
        source: opex.datacenter.electricity_cost
      maintenance_cost:
        source: opex.datacenter.maintenance_cost
      network_cost:
        source: opex.datacenter.network_cost
      land_rent:
        source: opex.datacenter.land_rent
      other_datacenter_opex:
        source: opex.datacenter.other_opex
      total_datacenter_opex:
        source: opex.datacenter.total_datacenter_opex
    team_opex:
      payroll_gross:
        source: team.payroll_gross
      annual_bonus:
        source: team.annual_bonus
      social_contribution_sfr:
        source: team.social_contribution_sfr
      total_team_opex:
        source: team.annual_team_opex
    gpu_rental_opex:
      annual_gpu_rental_cost:
        source: opex.gpu_rental.annual_gpu_rental_cost
    total_cogs: total_datacenter_opex + total_team_opex + annual_gpu_rental_cost
  gross_profit:
    formula: total_revenue - total_cogs
  sga_block:
    description: >
      SG&A = overhead costs, не относящиеся к delivery.
    corporate_management:
      source: sga.corporate_management
    hr:
      source: sga.hr
    finance_and_accounting:
      source: sga.finance_and_accounting
    admin:
      source: sga.admin
    shared_corporate_services:
      source: sga.shared_corporate_services
    office_rent:
      source: sga.office_rent.annual_office_rent
    total_sga:
      source: sga.total_sga
  ebitda: gross_profit - total_sga
  depreciation_block:
    description: >
      Амортизация только собственных активов.
    gpu_depreciation:
      source: capex.gpu_depreciation
    datacenter_depreciation:
      source: capex.datacenter_depreciation
    office_capex_depreciation:
      source: capex.office_capex_depreciation
    ip_amortization:
      source: intangible_assets.annual_ip_amortization
    total_depreciation: gpu_depreciation + datacenter_depreciation + office_capex_depreciation + ip_amortization
  ebit:
    formula: ebitda - total_depreciation
  profit_tax: max(ebit, 0) * profit_tax_rate
  net_income: ebit - profit_tax
  html_output:
    wide_format: true
    tables:
      revenue:
        - workplace_ai_revenue
        - contact_center_ai_revenue
        - total_revenue
      cogs:
        - electricity_cost
        - maintenance_cost
        - network_cost
        - land_rent
        - other_datacenter_opex
        - total_datacenter_opex
        - payroll_gross
        - annual_bonus
        - social_contribution_sfr
        - total_team_opex
        - annual_gpu_rental_cost
        - total_cogs
      sga:
        - corporate_management
        - hr
        - finance_and_accounting
        - admin
        - shared_corporate_services
        - office_rent
        - total_sga
      pnl_summary:
        - total_revenue
        - total_cogs
        - gross_profit
        - total_sga
        - ebitda
        - total_depreciation
        - ebit
        - profit_tax
        - net_income

cash_flow:
  currency: RUB
  description: >
    Cash Flow Statement (CFS) GPS. Формируется на основе Net Income,
    Depreciation и инвестиционных расходов CAPEX.
  opening_cash_balance:
    2026: 0
  financing_cash_flow:
    description: >
      На первом этапе financing cash flow = 0.
      Позже может быть заменено на equity injection
      или debt funding.
    value:
      2026: 0
      2027: 0
      2028: 0
      2029: 0
      2030: 0
  operating_cash_flow:
    net_income:
      source: pnl.net_income
    depreciation:
      source: pnl.depreciation_block.total_depreciation
    operating_cash_flow:
      formula: net_income + total_depreciation
  investing_cash_flow:
    gpu_infra_capex:
      source: capex.gpu_infra_capex
    datacenter_construction_capex:
      source: capex.datacenter_construction_capex
    office_capex:
      source: capex.total_office_capex
    intangible_capex:
      source: capex.intangible_capex
    investing_cash_flow:
      formula: -gpu_infra_capex -datacenter_construction_capex -office_capex -intangible_capex
  financing_section:
    financing_cash_flow:
      source: cash_flow.financing_cash_flow.value
  net_cash_flow:
    formula: operating_cash_flow + investing_cash_flow + financing_cash_flow
  cash_balance:
    opening_cash:
      formula: previous_year_closing_cash
    closing_cash: opening_cash + net_cash_flow
    cumulative_cash: cumulative_previous_year + net_cash_flow
  html_output:
    wide_format: true
    tables:
      cash_flow_statement:
        - net_income
        - total_depreciation
        - operating_cash_flow
        - gpu_infra_capex
        - datacenter_construction_capex
        - office_capex
        - intangible_capex
        - investing_cash_flow

        - financing_cash_flow

        - net_cash_flow

        - opening_cash
        - closing_cash
        - cumulative_cash

funding:
  currency: RUB
  description: >
    Funding model GPS. Используется для покрытия отрицательного cash balance
    через equity, revolver или mix.
  active_scenario: mix
  scenarios:
    equity_only:
      equity_share:
        value: 1.0
      revolver_share:
        value: 0.0
    revolver_only:
      equity_share:
        value: 0.0
      revolver_share:
        value: 1.0
    mix:
      description: >
        Funding need покрывается комбинацией equity и revolver.
        Доли задаются пользователем вручную.
      equity_share:
        value: 0.50
      revolver_share:
        value: 0.50
      validation:
        formula: equity_share + revolver_share = 1.0
  revolver:
    interest_rate:
      2026: 0.25
      2027: 0.25
      2028: 0.25
      2029: 0.25
      2030: 0.25
  calculation_logic:
    funding_need: max(-closing_cash_before_funding, 0)
    equity_injection: funding_need * equity_share
    revolver_drawdown: funding_need * revolver_share
    revolver_balance: previous_revolver_balance + revolver_drawdown - revolver_repayment
    interest_expense: average_revolver_balance * revolver_interest_rate
    closing_cash_after_funding: closing_cash_before_funding + equity_injection + revolver_drawdown

balance_sheet:
  currency: RUB
  description: >
    Balance Sheet GPS. Строится на основе Cash Flow, CAPEX,
    Intangible Assets, Funding и P&L.
  assets:
    current_assets:
      cash:
        source: funding.closing_cash_after_funding
    non_current_assets:
      ppe:
        gross_ppe:
          formula: >
            cumulative_gpu_infra_capex + cumulative_datacenter_construction_capex + cumulative_office_capex
        accumulated_depreciation:
          formula: cumulative_gpu_depreciation + cumulative_datacenter_depreciation + cumulative_office_capex_depreciation
        net_ppe:
          formula: gross_ppe - accumulated_depreciation
      intangible_assets:
        gross_intangible_assets:
          formula: cumulative_workplace_ai_ip_value + cumulative_contact_center_ai_ip_value
        accumulated_amortization:
          formula: cumulative_ip_amortization
        net_intangible_assets:
          formula: gross_intangible_assets - accumulated_amortization
    total_assets:
      formula: cash + net_ppe + net_intangible_assets
  liabilities:
    debt:
      revolver_balance:
        source: funding.revolver_balance
    total_liabilities:
      formula: revolver_balance
  equity:
    paid_in_capital:
      formula: cumulative_equity_injection
    retained_earnings:
      formula: cumulative_net_income
    total_equity:
      formula: paid_in_capital + retained_earnings
  balance_check:
    formula: total_assets - total_liabilities - total_equity
  html_output:
    wide_format: true
    tables:
      funding:
        - funding_need
        - equity_injection
        - revolver_drawdown
        - revolver_balance
        - interest_expense
        - closing_cash_after_funding
      balance_sheet:
        - cash
        - gross_ppe
        - accumulated_depreciation
        - net_ppe
        - gross_intangible_assets
        - accumulated_amortization
        - net_intangible_assets
        - total_assets
        - revolver_balance
        - total_liabilities
        - paid_in_capital
        - retained_earnings
        - total_equity
        - balance_check

investment_metrics:
  currency: RUB
  description: >
    DCF / Investment Metrics model GPS.
    Используется для оценки инвестиционной привлекательности
    сценариев build_own_dc / rent_gpu_only / hybrid.
  discount_rate:
    description: >
      Discount rate / WACC proxy для DCF модели.
      Используется как hurdle rate для IC.
      Должен быть editable parameter.
    value:
      2026: 0.30
  free_cash_flow:
    operating_cash_flow:
      source: cash_flow.operating_cash_flow.operating_cash_flow
    investing_cash_flow:
      source: cash_flow.investing_cash_flow.investing_cash_flow
    free_cash_flow:
      formula: operating_cash_flow + investing_cash_flow
  discounted_cash_flow:
    discount_factor:
      formula: 1 / (1 + discount_rate)^year_index
    discounted_fcf: free_cash_flow * discount_factor
  valuation:
    npv:
      formula: sum(discounted_fcf)
    irr: IRR(free_cash_flow_series)
  payback:
    simple_payback:
      description: >
        Первый год, когда cumulative_cash > 0
      formula: first_year(cumulative_cash > 0)
    discounted_payback:
      description: >
        Первый год, когда cumulative_discounted_fcf > 0
      formula: first_year(cumulative_discounted_fcf > 0)
  scenario_comparison:
    compare_by:
      - build_own_dc
      - rent_gpu_only
      - hybrid
    metrics:
      - npv
      - irr
      - simple_payback
      - discounted_payback
    wide_format: true
  return_metrics:
    description: >
      Метрики доходности и эффективности капитала GPS.
    roic:
      formula: nopat / average_invested_capital
      components:
        nopat: ebit * (1 - profit_tax_rate)
        invested_capital: net_ppe + net_intangible_assets
        average_invested_capital: (invested_capital_beginning + invested_capital_ending) / 2
    roe:
      formula: net_income / average_equity
      components:
        average_equity: (total_equity_beginning + total_equity_ending) / 2
    roa:
      formula: net_income / average_total_assets
      components:
        average_total_assets: (total_assets_beginning + total_assets_ending) / 2
    debt_to_equity:
      formula: revolver_balance / total_equity
    net_debt:
      formula: revolver_balance - cash
    net_debt_to_ebitda:
      formula: net_debt / ebitda
    interest_coverage:
      formula: ebit / interest_expense
  sensitivity_analysis:
    description: >
      Sensitivity analysis для ключевых драйверов инвестиционной модели GPS.

    active_cases:
      - base
      - downside
      - upside
    drivers:
      discount_rate:
        base: 0.30
        downside: 0.35
        upside: 0.25
      target_contribution_margin:
        base_multiplier: 1.00
        downside_multiplier: 0.85
        upside_multiplier: 1.15
      token_capacity_utilization:
        base_multiplier: 1.00
        downside_multiplier: 0.80
        upside_multiplier: 1.20
      gpu_unit_cost:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      gpu_rental_price:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      electricity_price:
        base_multiplier: 1.00
        downside_multiplier: 1.20
        upside_multiplier: 0.90
      fx_usd_rub:
        base_multiplier: 1.00
        downside_multiplier: 1.15
        upside_multiplier: 0.90
    output_metrics:
      - npv
      - irr
      - simple_payback
      - discounted_payback
      - roic
      - roe
      - net_debt_to_ebitda
    html_output:
      tables:
        return_metrics:
          - roic
          - roe
          - roa
          - debt_to_equity
          - net_debt
          - net_debt_to_ebitda
          - interest_coverage
        sensitivity_analysis:
          - npv
          - irr
          - simple_payback
          - discounted_payback
          - roic
          - roe
          - net_debt_to_ebitda